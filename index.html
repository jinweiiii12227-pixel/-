<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Anti-Peacekeeper</title>
<style>
:root{
--bg:#121214;
--card:#1a1a1e;
--border:#2c2c35;
--text:#f5f5f7;
--muted:#98989f;
--primary:#ff477e;
--secondary:#00f2fe;
}
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif;
}
body{
background:var(--bg);
color:var(--text);
padding:20px;
}
header{
text-align:center;
margin-bottom:30px;
}
h1{
font-size:32px;
background:linear-gradient(
45deg,
var(--primary),
var(--secondary)
);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}
.subtitle{
color:var(--muted);
margin-top:8px;
}
.card{
background:var(--card);
border:1px solid var(--border);
border-radius:20px;
padding:20px;
margin-bottom:20px;
}
h2{
margin-bottom:15px;
}
textarea{
width:100%;
min-height:180px;
background:#111;
border:1px solid var(--border);
border-radius:15px;
padding:15px;
color:white;
font-size:16px;
resize:none;
}
button{
border:none;
cursor:pointer;
}
.generate-btn{
width:100%;
margin-top:15px;
padding:15px;
border-radius:15px;
background:linear-gradient(
45deg,
var(--primary),
var(--secondary)
);
color:white;
font-size:16px;
font-weight:bold;
}
.reply-card{
display:none;
margin-top:20px;
}
.reply-box{
position:relative;
background:#111;
padding:15px;
border-radius:15px;
margin-bottom:15px;
padding-right:70px;
line-height:1.6;
}
.copy-btn{
position:absolute;
right:12px;
top:12px;
background:none;
color:var(--secondary);
font-weight:bold;
}
.tag{
font-weight:bold;
margin-bottom:10px;
}
.toast{
position:fixed;
left:50%;
bottom:40px;
transform:translateX(-50%);
background:black;
padding:12px 20px;
border-radius:30px;
display:none;
}
</style>
</head>
<body>
<header>
<h1>ANTI-PEACEKEEPER</h1>
<div class="subtitle">
温柔地亮出你的獠牙
</div>
</header>
<div class="card">
<h2>🧠 AI 边界回复生成器</h2>
<p style="color:gray;margin-bottom:15px;">
今天谁又来消耗你了？
</p>
<textarea
id="situation"
placeholder="例如：
老板突然叫我周末加班...
朋友一直借钱不还...
妈妈逼我参加聚会..."
></textarea>
<button
class="generate-btn"
onclick="generateReply()"
>
✨ 生成回复
</button>
</div>
<div
class="card reply-card"
id="result"
>
<div class="tag">🩷 温柔版</div>
<div class="reply-box">
<span id="soft"></span>
<button
class="copy-btn"
onclick="copyText('soft')"
>
复制
</button>
</div>
<div class="tag">🔥 坚定版</div>
<div class="reply-box">
<span id="firm"></span>
<button
class="copy-btn"
onclick="copyText('firm')"
>
复制
</button>
</div>
<div class="tag">😈 微叛逆版</div>
<div class="reply-box">
<span id="rebel"></span>
<button
class="copy-btn"
onclick="copyText('rebel')"
>
复制
</button>
</div>
</div>
<div class="toast" id="toast">
已复制
</div>
<script>
function generateReply(){
const text =
document.getElementById(
'situation'
).value.toLowerCase();
if(!text){
showToast('先输入情况～');
return;
}
let soft =
'谢谢你想到我，但这次我无法答应。';
let firm =
'这件事我无法配合。';
let rebel =
'我没有义务满足所有人的期待。';
if(
text.includes('加班') ||
text.includes('老板') ||
text.includes('工作')
){
soft =
'我已经有安排了，这次无法加班。';
firm =
'下班后的时间属于我自己。';
rebel =
'临时安排，不代表我必须配合。';
}
else if(
text.includes('借钱')
){
soft =
'我目前不方便借钱。';
firm =
'关于借钱，我决定不参与。';
rebel =
'我的钱需要先照顾我自己。';
}
else if(
text.includes('聚会') ||
text.includes('饭局')
){
soft =
'谢谢邀请，但这次我想休息。';
firm =
'这次我不会参加。';
rebel =
'我有权利拒绝无效社交。';
}
else if(
text.includes('帮忙') ||
text.includes('为了你好')
){
soft =
'谢谢你的信任，但我帮不上忙。';
firm =
'帮忙是选择，不是义务。';
rebel =
'别人的期待不是我的责任。';
}
document.getElementById(
'soft'
).innerText = soft;
document.getElementById(
'firm'
).innerText = firm;
document.getElementById(
'rebel'
).innerText = rebel;
document.getElementById(
'result'
).style.display='block';
window.scrollTo({
top:document.body.scrollHeight,
behavior:'smooth'
});
}
function copyText(id){
const text =
document.getElementById(id)
.innerText;
navigator.clipboard
.writeText(text);
showToast('复制成功！');
}
function showToast(msg){
const toast =
document.getElementById('toast');
toast.innerText = msg;
toast.style.display='block';
setTimeout(()=>{
toast.style.display='none';
},1500);
}
</script>
</body>
</html>
